  <!-- がらくた倉庫 パスワードモーダル -->
  <div id="garakuta-modal" class="modal-overlay" onclick="closeGarakutaModal(event)">
    <div class="modal-box">
      <p class="modal-title"><i class="fa-solid fa-box-archive"></i> がらくた倉庫</p>
      <p class="modal-desc">パスワードを入力してください</p>
      <input
        id="garakuta-input"
        type="password"
        class="modal-input"
        placeholder="password"
        onkeydown="if(event.key==='Enter') checkGarakutaPassword()"
        autocomplete="off"
      >
      <p id="garakuta-error" class="modal-error"></p>
      <div class="modal-actions">
        <button type="button" class="modal-btn modal-btn--cancel" onclick="closeGarakutaModal()">キャンセル</button>
        <button type="button" class="modal-btn modal-btn--ok" onclick="checkGarakutaPassword()">開く</button>
      </div>
    </div>
  </div>

  <script>
    function openGarakutaModal() {
      const modal = document.getElementById('garakuta-modal');
      const input = document.getElementById('garakuta-input');
      const error = document.getElementById('garakuta-error');
      input.value = '';
      error.textContent = '';
      modal.classList.add('is-open');
      setTimeout(() => input.focus(), 100);
    }

    function closeGarakutaModal(e) {
      if (e && e.target !== document.getElementById('garakuta-modal')) return;
      document.getElementById('garakuta-modal').classList.remove('is-open');
    }

    function checkGarakutaPassword() {
      const input = document.getElementById('garakuta-input');
      const error = document.getElementById('garakuta-error');
      if (input.value === 'JIMJIMJIM') {
        document.getElementById('garakuta-modal').classList.remove('is-open');
        window.open('https://drive.google.com/drive/folders/1w5NbnKpiRdLwt1q4TigeBmR9JuSi17_i?usp=drive_link', '_blank', 'noopener');
      } else {
        error.textContent = 'パスワードが違います';
        input.value = '';
        input.focus();
      }
    }
  </script>
